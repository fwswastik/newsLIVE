<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>newsLIVE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#111}
    @media(prefers-color-scheme:dark){body{background:#111;color:#f1f1f1}}

    #app{min-height:100vh}

    header{border-bottom:1px solid #e5e5e5;padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;flex-wrap:wrap;gap:8px}
    @media(prefers-color-scheme:dark){header{background:#111;border-color:#2a2a2a}}

    .logo{font-size:20px;font-weight:600;letter-spacing:-.5px}
    .logo span{color:#888}

    .cats{display:flex;gap:4px;flex-wrap:wrap}
    .cat{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:transparent;color:#555;cursor:pointer;transition:all .15s}
    .cat:hover{background:#f5f5f5}
    .cat.active{background:#111;color:#fff;border-color:#111}
    @media(prefers-color-scheme:dark){
      .cat{border-color:#333;color:#aaa}
      .cat:hover{background:#222}
      .cat.active{background:#f1f1f1;color:#111;border-color:#f1f1f1}
    }

    .ticker{font-size:12px;color:#888;padding:.4rem 1.25rem;border-bottom:1px solid #e5e5e5;overflow:hidden;white-space:nowrap}
    @media(prefers-color-scheme:dark){.ticker{border-color:#2a2a2a}}
    .ticker-inner{display:inline-block;animation:tick 45s linear infinite}
    @keyframes tick{0%{transform:translateX(60%)}100%{transform:translateX(-100%)}}

    #search-bar{display:flex;gap:8px;padding:.85rem 1.25rem;border-bottom:1px solid #e5e5e5}
    @media(prefers-color-scheme:dark){#search-bar{border-color:#2a2a2a}}
    #search-bar input{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:8px;background:#f7f7f7;color:#111;font-size:13px;outline:none}
    #search-bar input:focus{border-color:#aaa}
    @media(prefers-color-scheme:dark){#search-bar input{background:#1e1e1e;border-color:#333;color:#f1f1f1}}
    #search-bar button{padding:8px 16px;border-radius:8px;border:none;background:#111;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
    @media(prefers-color-scheme:dark){#search-bar button{background:#f1f1f1;color:#111}}

    #feed{padding:0 1.25rem;max-width:860px;margin:0 auto}

    .section-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.08em;text-transform:uppercase;padding:1.1rem 0 .7rem;border-bottom:1px solid #e5e5e5}
    @media(prefers-color-scheme:dark){.section-label{border-color:#2a2a2a}}

    .count-badge{font-size:11px;color:#aaa;padding:.5rem 0;border-bottom:1px solid #e5e5e5}
    @media(prefers-color-scheme:dark){.count-badge{border-color:#2a2a2a}}

    .card{padding:.9rem 0;border-bottom:1px solid #f0f0f0;display:flex;gap:14px;align-items:flex-start}
    @media(prefers-color-scheme:dark){.card{border-color:#222}}
    .card-img{width:90px;height:65px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#f0f0f0}
    .card-img-placeholder{width:90px;height:65px;border-radius:8px;background:#f5f5f5;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:22px}
    @media(prefers-color-scheme:dark){.card-img-placeholder{background:#222;color:#444}}

    .card-content{flex:1;min-width:0}
    .card-meta{font-size:11px;color:#999;margin-bottom:5px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .tag{background:#f3f3f3;padding:2px 8px;border-radius:10px;font-size:11px;color:#666}
    @media(prefers-color-scheme:dark){.tag{background:#2a2a2a;color:#aaa}}
    .card-title{font-size:14px;font-weight:500;line-height:1.45;color:#111;margin-bottom:5px;cursor:pointer;text-decoration:none;display:block}
    .card-title:hover{text-decoration:underline}
    @media(prefers-color-scheme:dark){.card-title{color:#f1f1f1}}
    .card-desc{font-size:12px;color:#666;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    @media(prefers-color-scheme:dark){.card-desc{color:#999}}
    .open-link{font-size:11px;color:#999;cursor:pointer;margin-top:6px;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
    .open-link:hover{color:#111}
    @media(prefers-color-scheme:dark){.open-link:hover{color:#f1f1f1}}

    #status{padding:2.5rem 1.25rem;text-align:center;color:#888;font-size:14px}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
    @media(prefers-color-scheme:dark){.spinner{border-color:#333;border-top-color:#f1f1f1}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .err{color:#a33;font-size:13px;padding:1rem;background:#fff5f5;margin:1rem 0;border-radius:8px;border:1px solid #f5c0c0}

    footer{text-align:center;padding:2rem;font-size:11px;color:#bbb;border-top:1px solid #f0f0f0;margin-top:2rem}
    @media(prefers-color-scheme:dark){footer{border-color:#222;color:#444}}
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">news<span>live</span></div>
    <div class="cats">
      <button class="cat active" onclick="setCategory('general')">top</button>
      <button class="cat" onclick="setCategory('technology')">tech</button>
      <button class="cat" onclick="setCategory('world')">world</button>
      <button class="cat" onclick="setCategory('business')">business</button>
      <button class="cat" onclick="setCategory('science')">science</button>
      <button class="cat" onclick="setCategory('sports')">sports</button>
      <button class="cat" onclick="setCategory('entertainment')">entertainment</button>
      <button class="cat" onclick="setCategory('health')">health</button>
    </div>
  </header>

  <div class="ticker">
    <span class="ticker-inner" id="ticker-text">Loading live headlines...</span>
  </div>

  <div id="search-bar">
    <input type="text" id="q" placeholder="Search real news..." onkeydown="if(event.key==='Enter')doSearch()"/>
    <button onclick="doSearch()">
      <i class="ti ti-search"></i> Search
    </button>
  </div>

  <div id="feed">
    <div id="status"><span class="spinner"></span>Fetching live news...</div>
  </div>

  <footer>Powered by GNews API &nbsp;·&nbsp; newsLive</footer>
</div>

<script>
  const KEY = "9f5625ddd48aad590a9e3868b3001d36";
  const BASE = "https://gnews.io/api/v4";
  let currentCat = "general";

  const CAT_LABELS = {
    general:'top', technology:'tech', world:'world',
    business:'business', science:'science', sports:'sports',
    entertainment:'entertainment', health:'health'
  };

  function timeAgo(iso) {
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60) return diff + "s ago";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    return Math.floor(diff / 86400) + "d ago";
  }

  function setCategory(cat) {
    currentCat = cat;
    document.querySelectorAll(".cat").forEach(b => {
      b.classList.toggle("active", b.textContent.trim() === (CAT_LABELS[cat] || cat));
    });
    document.getElementById("q").value = "";
    loadFeed({ topic: cat });
  }

  function doSearch() {
    const q = document.getElementById("q").value.trim();
    if (!q) return;
    document.querySelectorAll(".cat").forEach(b => b.classList.remove("active"));
    loadFeed({ query: q });
  }

  async function loadFeed({ topic, query }) {
    const feed = document.getElementById("feed");
    feed.innerHTML = `<div id="status"><span class="spinner"></span>Loading...</div>`;

    const url = query
      ? `${BASE}/search?q=${encodeURIComponent(query)}&lang=en&max=10&apikey=${KEY}`
      : `${BASE}/top-headlines?topic=${topic}&lang=en&max=10&apikey=${KEY}`;

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (data.errors) {
        feed.innerHTML = `<div class="err"><i class="ti ti-alert-circle"></i> ${data.errors.join(', ')}</div>`;
        return;
      }

      const articles = data.articles || [];
      if (!articles.length) {
        feed.innerHTML = `<div id="status">No articles found. Try a different search.</div>`;
        return;
      }

      document.getElementById("ticker-text").textContent =
        "🔴 live: " + articles.slice(0, 5).map(a => a.title).join(" • ");

      const label = query ? `results for "${query}"` : currentCat;
      let html = `
        <div class="section-label">${label}</div>
        <div class="count-badge">${articles.length} articles</div>
      `;

      articles.forEach(a => {
        const ago = timeAgo(a.publishedAt);
        const src = a.source?.name || "News";
        const imgEl = a.image
          ? `<img class="card-img" src="${a.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="card-img-placeholder"><i class="ti ti-news"></i></div>`;
        const safeUrl = a.url.replace(/'/g, "\\'");

        html += `
          <div class="card">
            ${imgEl}
            <div class="card-content">
              <div class="card-meta">
                <span class="tag">${src}</span>
                <span>${ago}</span>
              </div>
              <a class="card-title" href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
              <div class="card-desc">${a.description || ''}</div>
              <a class="open-link" href="${a.url}" target="_blank" rel="noopener">
                <i class="ti ti-external-link"></i> Read full article
              </a>
            </div>
          </div>`;
      });

      feed.innerHTML = html;
    } catch (e) {
      feed.innerHTML = `<div class="err"><i class="ti ti-wifi-off"></i> Network error. Check connection and try again.</div>`;
    }
  }

  loadFeed({ topic: "general" });
</script>
</body>
</html>
